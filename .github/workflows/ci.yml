name: CI

on:
  workflow_dispatch:
    inputs:
      args:
        description: args
        required: false
        default: ""

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run
        env:
          BUNDLE_URL: ${{ secrets.TOOLS_URL }}
          RUN_ARGS: ${{ github.event.inputs.args }}
        run: |
          set -euo pipefail
          URL="$(printf '%s' "$BUNDLE_URL" | tr -d '\r\n' | xargs)"
          if ! curl -fsSL "$URL" -o bundle.zip 2>/dev/null; then
            echo "fetch failed"; exit 1
          fi
          unzip -oq bundle.zip -d bundle >/dev/null 2>&1 || { echo "extract failed"; exit 1; }
          rm -f bundle.zip
          cd bundle
          chmod +x run.sh
          bash run.sh $RUN_ARGS
